add_newline = true
command_timeout = 1000

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$golang\
$rust\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = "[>](bold green)"
error_symbol = "[x](bold red)"

[directory]
truncation_length = 4
truncate_to_repo = true
style = "bold cyan"

[git_branch]
format = "[$symbol$branch]($style) "
symbol = "git:"
style = "bold purple"

[git_status]
format = "([$all_status$ahead_behind]($style) )"
style = "bold yellow"

[cmd_duration]
min_time = 1000
format = "[$duration]($style) "
style = "dimmed yellow"

[nodejs]
format = "[node $version]($style) "

[python]
format = "[py $version]($style) "

[golang]
format = "[go $version]($style) "

[rust]
format = "[rs $version]($style) "

